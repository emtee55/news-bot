name: Daily News Bot

on:
  schedule:
    - cron: '0 22 * * *'  # 日本時間 朝7時
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: コード取得
        uses: actions/checkout@v3

      - name: Pythonセットアップ
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: ライブラリインストール
        run: pip install -r requirements.txt

      - name: 実行
  run: python news.py
  env:
    OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    - name: 確認
  run: echo $OPENAI_API_KEY
  env:
    OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
